<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quicker Banking</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --purple: #6d28d9;
      --purple-dark: #4c1d95;
      --purple-mid: #7c3aed;
      --purple-light: #ede9fe;
      --purple-xlight: #f5f3ff;
      --white: #ffffff;
      --bg: #f7f6fb;
      --text: #1e1b2e;
      --subtext: #6b7280;
      --border: #e5e7eb;
      --green: #059669;
      --red: #dc2626;
      --card-shadow: 0 2px 12px rgba(109,40,217,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ═══════════════ PAGES ═══════════════ */
    .page {
      display: none;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .page.active { display: block; }

    /* ═══════════════ TOP BAR ═══════════════ */
    .topbar {
      background: var(--white);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-logo {
      font-size: 20px;
      font-weight: 800;
      color: var(--purple);
      letter-spacing: -0.5px;
    }
    .topbar-logo span { color: var(--text); }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-right i { font-size: 18px; color: var(--subtext); cursor: pointer; }
    .avatar-small {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--purple-mid));
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 14px;
    }

    /* ═══════════════ BOTTOM NAV ═══════════════ */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 10px 0 20px;
      z-index: 100;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
    }
    .nav-item {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      cursor: pointer;
      color: var(--subtext);
      font-size: 10px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 12px;
      transition: all 0.2s;
      background: none; border: none;
    }
    .nav-item i { font-size: 20px; }
    .nav-item.active { color: var(--purple); }
    .nav-item.active i { color: var(--purple); }

    /* ═══════════════ HOME PAGE ═══════════════ */
    .home-header {
      background: linear-gradient(160deg, var(--purple-dark) 0%, var(--purple-mid) 100%);
      padding: 24px 20px 40px;
      color: white;
    }
    .home-greeting { font-size: 14px; opacity: 0.85; margin-bottom: 4px; }
    .home-name { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    .balance-card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 20px;
    }
    .balance-label { font-size: 12px; opacity: 0.8; margin-bottom: 6px; }
    .balance-amount { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
    .balance-sub { font-size: 12px; opacity: 0.7; margin-top: 4px; }
    .balance-row {
      display: flex; gap: 12px; margin-top: 16px;
    }
    .balance-mini {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px;
    }
    .balance-mini .lbl { font-size: 11px; opacity: 0.75; margin-bottom: 4px; }
    .balance-mini .val { font-size: 16px; font-weight: 700; }

    .home-body { padding: 20px; margin-top: -16px; }

    /* QUICK SEND */
    .section-label {
      font-size: 13px; font-weight: 700;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }
    .contacts-row {
      display: flex; gap: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 24px;
      scrollbar-width: none;
    }
    .contacts-row::-webkit-scrollbar { display: none; }
    .contact-item {
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      cursor: pointer; flex-shrink: 0;
    }
    .contact-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; color: white;
    }
    .contact-name { font-size: 11px; color: var(--subtext); text-align: center; }
    .contact-add {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--purple-light);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .contact-add i { color: var(--purple); font-size: 20px; }

    /* QUICK ACTIONS */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .quick-btn {
      background: var(--white);
      border-radius: 16px;
      padding: 14px 8px;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      cursor: pointer;
      box-shadow: var(--card-shadow);
      border: none;
    }
    .quick-btn .icon-wrap {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--purple-light);
      display: flex; align-items: center; justify-content: center;
    }
    .quick-btn i { color: var(--purple); font-size: 18px; }
    .quick-btn span { font-size: 11px; font-weight: 600; color: var(--text); }

    /* TRANSACTIONS */
    .txn-card {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      margin-bottom: 16px;
    }
    .txn-header {
      padding: 16px 16px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .txn-header span { font-size: 12px; color: var(--purple); font-weight: 600; cursor: pointer; }
    .txn-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 12px;
      border-top: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .txn-item:hover { background: var(--bg); }
    .txn-icon-wrap {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: var(--purple-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .txn-icon-wrap i { color: var(--purple); font-size: 16px; }
    .txn-info { flex: 1; }
    .txn-info .name { font-size: 14px; font-weight: 600; }
    .txn-info .date { font-size: 12px; color: var(--subtext); margin-top: 2px; }
    .txn-amt { font-size: 15px; font-weight: 700; }
    .txn-amt.debit { color: var(--red); }
    .txn-amt.credit { color: var(--green); }

    /* ═══════════════ SEND PAGE ═══════════════ */
    .page-header {
      background: var(--white);
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .page-title { font-size: 20px; font-weight: 800; color: var(--text); }
    .page-sub { font-size: 13px; color: var(--subtext); margin-top: 2px; }

    .send-body { padding: 20px; }

    .search-bar {
      display: flex; align-items: center;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-bar i { color: var(--subtext); font-size: 16px; }
    .search-bar input {
      border: none; outline: none;
      font-size: 15px; background: transparent;
      width: 100%; color: var(--text);
    }

    .send-contacts-label { font-size: 13px; font-weight: 700; color: var(--subtext); margin-bottom: 12px; }
    .send-contact-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px; }
    .send-contact-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 16px;
      background: var(--white);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.15s;
      border: 2px solid transparent;
    }
    .send-contact-item:hover { border-color: var(--purple); }
    .send-contact-item.selected { border-color: var(--purple); background: var(--purple-xlight); }
    .send-contact-item .c-avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 17px; color: white; flex-shrink: 0;
    }
    .send-contact-item .c-info .c-name { font-size: 15px; font-weight: 600; }
    .send-contact-item .c-info .c-bank { font-size: 12px; color: var(--subtext); }
    .send-contact-item .c-check { margin-left: auto; color: var(--purple); display: none; }
    .send-contact-item.selected .c-check { display: block; }

    .amount-box {
      background: var(--white);
      border-radius: 20px;
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: var(--card-shadow);
    }
    .amount-box .amount-label { font-size: 13px; color: var(--subtext); margin-bottom: 12px; }
    .amount-display {
      font-size: 48px; font-weight: 800;
      color: var(--purple-dark);
      letter-spacing: -2px;
      min-height: 60px;
    }
    .amount-display .cursor { animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .num-key {
      background: var(--white);
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      box-shadow: var(--card-shadow);
      transition: all 0.1s;
    }
    .num-key:active { transform: scale(0.95); background: var(--purple-light); }
    .num-key.del { color: var(--purple); }
    .num-key.empty { background: transparent; box-shadow: none; cursor: default; }

    .note-input {
      display: flex; align-items: center; gap: 10px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 20px;
    }
    .note-input i { color: var(--subtext); }
    .note-input input {
      border: none; outline: none; font-size: 14px;
      background: transparent; width: 100%;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple-mid));
      color: white;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary:not(:disabled):active { opacity: 0.85; }

    /* ═══════════════ REQUEST PAGE ═══════════════ */
    .request-body { padding: 20px; }
    .request-tabs {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .req-tab {
      flex: 1; padding: 10px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: white;
      font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center;
      color: var(--subtext);
    }
    .req-tab.active { border-color: var(--purple); color: var(--purple); background: var(--purple-xlight); }

    /* ═══════════════ ACTIVITY PAGE ═══════════════ */
    .activity-body { padding: 20px; }
    .filter-row {
      display: flex; gap: 8px; margin-bottom: 20px;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-pill {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      color: var(--subtext);
    }
    .filter-pill.active { border-color: var(--purple); color: var(--purple); background: var(--purple-xlight); }

    .activity-month { font-size: 12px; font-weight: 700; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }

    .activity-item {
      display: flex; align-items: center; gap: 14px;
      background: var(--white);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 8px;
      box-shadow: var(--card-shadow);
    }
    .act-icon {
      width: 46px; height: 46px; border-radius: 14px;
      background: var(--purple-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .act-icon i { color: var(--purple); font-size: 18px; }
    .act-info { flex: 1; }
    .act-info .act-name { font-size: 15px; font-weight: 600; }
    .act-info .act-detail { font-size: 12px; color: var(--subtext); margin-top: 2px; }
    .act-right { text-align: right; }
    .act-right .act-amt { font-size: 16px; font-weight: 700; }
    .act-right .act-amt.debit { color: var(--red); }
    .act-right .act-amt.credit { color: var(--green); }
    .act-right .act-status {
      font-size: 11px; margin-top: 3px;
      padding: 2px 8px; border-radius: 8px; display: inline-block;
    }
    .act-status.completed { background: #d1fae5; color: #065f46; }
    .act-status.pending { background: #fef3c7; color: #92400e; }

    /* ═══════════════ PROFILE PAGE ═══════════════ */
    .profile-header {
      background: linear-gradient(160deg, var(--purple-dark), var(--purple-mid));
      padding: 40px 20px 60px;
      text-align: center;
      color: white;
    }
    .profile-avatar {
      width: 84px; height: 84px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 3px solid rgba(255,255,255,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 800;
      margin: 0 auto 14px;
      color: white;
    }
    .profile-name { font-size: 22px; font-weight: 800; }
    .profile-email { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .profile-tag {
      margin-top: 10px;
      background: rgba(255,255,255,0.15);
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 13px;
    }

    .profile-body { padding: 20px; margin-top: -28px; }
    .profile-card {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      margin-bottom: 16px;
    }
    .profile-card-title {
      padding: 16px 20px 8px;
      font-size: 12px; font-weight: 700;
      color: var(--subtext); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .profile-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .profile-row:hover { background: var(--bg); }
    .profile-row .pr-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--purple-light);
      display: flex; align-items: center; justify-content: center;
    }
    .profile-row .pr-icon i { color: var(--purple); font-size: 15px; }
    .profile-row .pr-label { flex: 1; font-size: 15px; font-weight: 500; }
    .profile-row .pr-value { font-size: 13px; color: var(--subtext); }
    .profile-row i.arrow { color: var(--subtext); font-size: 13px; }

    .logout-btn {
      width: 100%;
      background: #fef2f2;
      color: var(--red);
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }

    /* ═══════════════ MODAL ═══════════════ */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--white);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--subtext); margin-bottom: 20px; }

    /* SUCCESS STATE */
    .success-wrap {
      text-align: center; padding: 20px 0;
    }
    .success-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: #d1fae5;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .success-icon i { color: var(--green); font-size: 36px; }
    .success-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: var(--subtext); margin-bottom: 24px; }

    /* ═══════════════ DESKTOP ═══════════════ */
    @media (min-width: 1024px) {
      body { display: flex; }

      .desktop-sidebar {
        width: 260px; height: 100vh;
        position: fixed; top: 0; left: 0;
        background: var(--purple-dark);
        display: flex; flex-direction: column;
        padding: 32px 0;
        z-index: 100;
      }
      .ds-logo {
        font-size: 22px; font-weight: 800;
        color: white; padding: 0 28px 28px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        margin-bottom: 16px;
      }
      .ds-logo span { color: rgba(255,255,255,0.5); }
      .ds-nav a {
        display: flex; align-items: center; gap: 14px;
        padding: 13px 28px;
        color: rgba(255,255,255,0.65);
        text-decoration: none; font-size: 14px; font-weight: 500;
        cursor: pointer; transition: all 0.15s;
        border: none; background: none; width: 100%; text-align: left;
      }
      .ds-nav a:hover { color: white; background: rgba(255,255,255,0.08); }
      .ds-nav a.active { color: white; background: rgba(255,255,255,0.15); }
      .ds-nav a i { width: 20px; text-align: center; font-size: 16px; }
      .ds-bottom {
        margin-top: auto; padding: 20px 28px;
        border-top: 1px solid rgba(255,255,255,0.1);
        display: flex; align-items: center; gap: 12px;
        color: rgba(255,255,255,0.7); font-size: 13px;
      }
      .ds-bottom .ds-av {
        width: 36px; height: 36px; border-radius: 50%;
        background: rgba(255,255,255,0.2);
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; color: white;
      }

      .app-wrapper {
        margin-left: 260px;
        width: calc(100% - 260px);
        min-height: 100vh;
      }

      .bottom-nav { display: none; }
      .topbar { padding: 16px 32px; }

      .page { padding-bottom: 0; }

      .home-body { padding: 32px; }
      .send-body, .request-body, .activity-body, .profile-body { padding: 32px; max-width: 700px; }

      .quick-grid { grid-template-columns: repeat(5, 1fr); }

      .home-header { padding: 32px 32px 48px; }
      .balance-row { gap: 16px; }

      /* two-col layout on desktop home */
      .home-desktop-grid {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 28px;
      }
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .quick-grid { grid-template-columns: repeat(5, 1fr); }
      .numpad { max-width:
